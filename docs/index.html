<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Чем заняться</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg: var(--tg-theme-bg-color, #0f0f13);
    --text: var(--tg-theme-text-color, #e0e0e8);
    --hint: var(--tg-theme-hint-color, #8080a0);
    --accent: var(--tg-theme-button-color, #8060c0);
    --accent-text: var(--tg-theme-button-text-color, #ffffff);
    --card-bg: var(--tg-theme-secondary-bg-color, #1a1a2e);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .screen {
    display: none;
    flex-direction: column;
    padding: 24px 20px;
    flex: 1;
    animation: fadeIn 0.25s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .subtitle {
    color: var(--hint);
    font-size: 0.9rem;
    margin-bottom: 28px;
  }

  .budget-card {
    background: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.1s ease;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .budget-card:active { transform: scale(0.97); opacity: 0.85; }

  .budget-card .icon {
    font-size: 1.6rem;
    flex-shrink: 0;
  }
  .budget-card .label {
    font-size: 1.05rem;
    font-weight: 600;
  }

  #screen-idea {
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .idea-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 36px 24px;
    width: 100%;
    max-width: 420px;
  }
  .idea-card .icon { font-size: 2.4rem; margin-bottom: 16px; }
  .idea-card .budget-label {
    color: var(--accent);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .idea-card .idea-text {
    font-size: 1.15rem;
    line-height: 1.5;
  }

  .place-name {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .place-address {
    color: var(--hint);
    font-size: 0.85rem;
    margin-bottom: 10px;
  }
  .place-meta {
    font-size: 0.95rem;
    margin-bottom: 18px;
  }
  .place-meta .stars { color: #f5b700; }
  .place-link {
    display: inline-block;
    color: var(--accent-text);
    background: var(--accent);
    text-decoration: none;
    padding: 10px 18px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.9rem;
  }

  .loading-dots::after {
    content: "";
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0% { content: ""; }
    25% { content: "."; }
    50% { content: ".."; }
    75% { content: "..."; }
  }

  /* Фолбэк-кнопки — видны только вне Telegram (нет нативных MainButton/BackButton) */
  .fallback-controls {
    display: none;
    gap: 10px;
    margin-top: 24px;
    width: 100%;
    max-width: 420px;
  }
  .fallback-controls.visible { display: flex; flex-direction: column; }
  .fallback-btn {
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  .fallback-btn.secondary {
    background: transparent;
    color: var(--hint);
  }
</style>
</head>
<body>

<div id="screen-budget" class="screen active">
  <h1>Куда сходить с друзьями?</h1>
  <p class="subtitle">Выбери бюджет на компанию — подскажу идею</p>

  <div class="budget-card" data-budget="free">
    <span class="icon">🆓</span>
    <span class="label">Бесплатно</span>
  </div>
  <div class="budget-card" data-budget="cheap">
    <span class="icon">💵</span>
    <span class="label">До 500 ₽</span>
  </div>
  <div class="budget-card" data-budget="medium">
    <span class="icon">💰</span>
    <span class="label">До 1500 ₽</span>
  </div>
</div>

<div id="screen-idea" class="screen">
  <div class="idea-card">
    <div class="icon">🎯</div>
    <div id="idea-budget-label" class="budget-label"></div>
    <div id="idea-text" class="idea-text"></div>
    <div id="idea-place" style="display:none">
      <div id="place-name" class="place-name"></div>
      <div id="place-address" class="place-address"></div>
      <div id="place-meta" class="place-meta"></div>
      <a id="place-link" class="place-link" target="_blank" rel="noopener">Открыть в 2ГИС →</a>
    </div>
  </div>
  <div id="fallback-controls" class="fallback-controls">
    <button id="fallback-more" class="fallback-btn">Ещё вариант 🔁</button>
    <button id="fallback-back" class="fallback-btn secondary">← Другой бюджет</button>
  </div>
</div>

<script>
  // URL бэкенда (Flask на Railway) — заполнить после деплоя server.py
  const API_BASE_URL = "https://example.up.railway.app";
</script>
<script>
  // telegram-web-app.js всегда создаёт window.Telegram.WebApp, даже вне Telegram —
  // поэтому проверяем platform, а не просто наличие объекта, чтобы понять,
  // реально ли мы внутри Telegram (там platform не "unknown").
  const tgRaw = window.Telegram ? window.Telegram.WebApp : null;
  const tg = tgRaw && tgRaw.platform !== "unknown" ? tgRaw : null;
  if (tg) {
    tg.ready();
    tg.expand();
  }

  let currentBudget = null;

  const BUDGET_LABELS = { free: "Бесплатно", cheap: "До 500 ₽", medium: "До 1500 ₽" };

  const screenBudget = document.getElementById("screen-budget");
  const screenIdea = document.getElementById("screen-idea");
  const ideaTextEl = document.getElementById("idea-text");
  const ideaPlaceEl = document.getElementById("idea-place");

  function showBudgetScreen() {
    screenIdea.classList.remove("active");
    screenBudget.classList.add("active");
    if (tg) {
      tg.MainButton.hide();
      tg.BackButton.hide();
    }
  }

  function renderStars(rating) {
    const full = Math.round(rating);
    return "★".repeat(full) + "☆".repeat(5 - full);
  }

  function renderIdea(data) {
    if (data.type === "place") {
      ideaTextEl.style.display = "none";
      ideaPlaceEl.style.display = "block";
      document.getElementById("place-name").textContent = data.place.name;
      document.getElementById("place-address").textContent = data.place.address || "";
      document.getElementById("place-meta").innerHTML =
        `<span class="stars">${renderStars(data.place.rating)}</span> ${data.place.rating} ` +
        `· ${data.place.review_count} отзывов · ${data.category}`;
      document.getElementById("place-link").href = data.place.url;
    } else {
      ideaPlaceEl.style.display = "none";
      ideaTextEl.style.display = "block";
      ideaTextEl.textContent = data.text;
    }
  }

  async function showIdeaScreen(budget) {
    currentBudget = budget;
    document.getElementById("idea-budget-label").textContent = BUDGET_LABELS[budget];

    ideaPlaceEl.style.display = "none";
    ideaTextEl.style.display = "block";
    ideaTextEl.textContent = "Ищу идею";
    ideaTextEl.classList.add("loading-dots");

    screenBudget.classList.remove("active");
    screenIdea.classList.add("active");
    if (tg) {
      tg.MainButton.setText("Ещё вариант 🔁");
      tg.MainButton.show();
      tg.BackButton.show();
    }

    try {
      const resp = await fetch(`${API_BASE_URL}/api/idea?budget=${budget}`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      ideaTextEl.classList.remove("loading-dots");
      renderIdea(data);
    } catch (e) {
      ideaTextEl.classList.remove("loading-dots");
      ideaPlaceEl.style.display = "none";
      ideaTextEl.style.display = "block";
      ideaTextEl.textContent = "Не получилось загрузить идею — попробуй ещё раз";
    }
  }

  document.querySelectorAll(".budget-card").forEach((card) => {
    card.addEventListener("click", () => showIdeaScreen(card.dataset.budget));
  });

  if (tg) {
    tg.MainButton.onClick(() => showIdeaScreen(currentBudget));
    tg.BackButton.onClick(() => showBudgetScreen());
  } else {
    // вне Telegram нативных кнопок нет — показываем свои для проверки в браузере
    document.getElementById("fallback-controls").classList.add("visible");
    document.getElementById("fallback-more").addEventListener("click", () => showIdeaScreen(currentBudget));
    document.getElementById("fallback-back").addEventListener("click", () => showBudgetScreen());
  }
</script>
</body>
</html>
